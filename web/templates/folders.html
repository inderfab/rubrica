{% extends "base.html" %}
{% block title %}Ordner – Rubrica{% endblock %}
{% block content %}
<h1>Ordner</h1>

<form method="post" action="/ordner/neu" class="filter">
    <input type="text" name="name" placeholder="Neuer Ordner…" required>
    <button type="submit">Anlegen</button>
</form>

{% if ordner %}
<table>
    <thead><tr><th>Name</th><th>Kontakte</th><th></th></tr></thead>
    <tbody>
        {% for o in ordner %}
        <tr>
            <td>
                <span id="ordner-anzeige-{{ o.id }}">
                    <a href="/kontakte?ordner_id={{ o.id }}">{{ o.name }}</a>
                </span>
                <form method="post" action="/ordner/{{ o.id }}/bearbeiten"
                      id="ordner-bearbeiten-{{ o.id }}" class="tel-row" style="display:none">
                    <input type="text" name="name" value="{{ o.name }}" required>
                    <button type="submit">Speichern</button>
                    <button type="button" class="secondary"
                            onclick="ordnerBearbeitenAbbrechen({{ o.id }})">Abbrechen</button>
                </form>
            </td>
            <td>{{ o.anzahl_kontakte }}</td>
            <td class="actions">
                <button type="button" class="secondary" onclick="ordnerBearbeitenStarten({{ o.id }})">Bearbeiten</button>
                <form method="post" action="/ordner/{{ o.id }}/loeschen" onsubmit="return confirm('Ordner wirklich löschen?')">
                    <button type="submit" class="danger">Löschen</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="empty">Noch keine Ordner angelegt.</p>
{% endif %}

<script>
function ordnerBearbeitenStarten(id) {
    document.getElementById('ordner-anzeige-' + id).style.display = 'none';
    document.getElementById('ordner-bearbeiten-' + id).style.display = 'flex';
}
function ordnerBearbeitenAbbrechen(id) {
    document.getElementById('ordner-bearbeiten-' + id).style.display = 'none';
    document.getElementById('ordner-anzeige-' + id).style.display = 'inline';
}
</script>
{% endblock %}
